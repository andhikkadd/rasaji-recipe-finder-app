steps:
  # Step 1: Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    dir: 'recipe-finder'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/recipe-finder:$COMMIT_SHA', '.']
  
  # Step 2: Push the container image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/recipe-finder:$COMMIT_SHA']
    
  # Step 3: Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'recipe-finder'
      - '--image'
      - 'gcr.io/$PROJECT_ID/recipe-finder:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/recipe-finder:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
